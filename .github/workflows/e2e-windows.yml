name: E2E (Windows full-stack)

# Layer 3 of the test pyramid (see docs/arc42-runtime-view.md). Runs the real
# Tauri binary against a real SQLite DB on the self-hosted Windows runner.
#
# Triggers:
#   - On push to main (so we catch regressions after merges)
#   - On workflow_dispatch (manual run when investigating a flake)
#   - NOT on every PR — the runs are slow and the runner is shared. PR-time
#     coverage comes from Layers 1+2 which run on free cloud runners.
#
# Caching strategy:
# We run on a single dedicated self-hosted Windows runner with a persistent
# filesystem. That persistent filesystem IS our cache — `clean: false` in
# checkout preserves everything between runs, and Cargo / Gradle / npm all
# handle incremental work naturally against on-disk state.
#
# We DO NOT use GitHub's actions/cache or Swatinem/rust-cache here. They're
# designed for ephemeral cloud runners where there's no persistent disk to
# carry state forward. On a self-hosted runner they instead spend 10-20 min
# per run uploading a 1-2 GB target/ tarball to GitHub's cache service over
# the runner's outbound bandwidth — for nothing, because next run already
# has the same target/ on disk. See commit history for the brief experiment
# that proved this.
#
#   - Rust:   target/ + ~/.cargo persists via clean: false
#   - Gradle: pdf-generator-cli/build/ + ~/.gradle persists via clean: false
#   - npm:    skip `npm ci` if node_modules/.lockfile-hash matches the
#             current package-lock.json
#   - JAR:    Gradle incremental compile against persisted build/ — sub-
#             second no-op when sources unchanged

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_smoke_only:
        description: 'Run only smoke tests (faster)'
        required: false
        default: 'false'

jobs:
  e2e:
    name: Tauri E2E on Windows
    # Self-hosted Windows runner tagged "windows" + "e2e". The runner must
    # have: VS Build Tools 2022, Rust stable, Node.js LTS, msedgedriver in
    # PATH, and tauri-driver installed via `cargo install tauri-driver`.
    # See WINDOWS_RUNNER_SETUP.md.
    runs-on: [self-hosted, windows, e2e]
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # Don't clean — preserve node_modules/, src-tauri/target/,
        # pdf-generator-cli/build/ between runs. Saves 5-15 min/run on
        # the warm runner.
        with:
          clean: false

      - name: Setup Node.js
        # Self-healing — actions/setup-node checks the runner's tool cache
        # first and skips download when Node 20 is already there (~1-2s
        # no-op). On a runner where Node went missing / corrupted, it
        # re-downloads ~30MB and gets us back to green.
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        # Self-healing toolchain step. On a healthy runner where the
        # active stable is already installed, this is ~5s no-op (rustup
        # confirms the toolchain matches and exits). On a runner where
        # rustup's proxy points to a missing / corrupt toolchain — which
        # happens occasionally from Defender quarantine, partial rustup
        # updates, or interrupted background processes — this re-installs
        # the missing pieces and gets CI back to green without needing
        # to manually RDP into the runner.
        #
        # Was: e2e-windows.yml relied entirely on pre-installed Rust per
        # WINDOWS_RUNNER_SETUP.md, which worked until 2026-05-24 when the
        # runner's `~\.rustup\toolchains\stable-x86_64-pc-windows-msvc\
        # bin\rustc.exe` went missing for unclear reasons (the rustup
        # proxy at `~\.cargo\bin\rustc.exe` was still there, but it
        # couldn't find the real binary to forward to → "No application
        # is associated with the specified file" hard-fail).
        #
        # The cost is ~5s/run when healthy. The benefit is "CI never gets
        # stuck waiting on a runner fix again". Easy trade.
        uses: dtolnay/rust-toolchain@stable

      - name: Ensure tauri-driver installed
        # Idempotent self-heal for tauri-driver. `cargo install` checks
        # the installed version against the requested one and skips work
        # if up to date — ~1-2s no-op when healthy. If it was wiped (e.g.
        # along with rustc during a Defender event), this reinstalls
        # without manual intervention. --locked keeps the install
        # reproducible against tauri-driver's own Cargo.lock.
        shell: pwsh
        run: cargo install tauri-driver --locked

      - name: Match msedgedriver to installed Edge
        # Self-heal the #1 cause of this suite's red runs: Edge/WebView2 is
        # evergreen and auto-updates on the runner, but msedgedriver was pinned
        # (manually dropped in C:\webdrivers per WINDOWS_RUNNER_SETUP.md). When
        # they drift apart, every session dies with
        #   "session not created: DevToolsActivePort file doesn't exist"
        # which is exactly what killed the July 2026 runs (green June 4, red
        # every run after Edge updated during the gap). This step downloads the
        # msedgedriver whose version matches the Edge on the box and puts it
        # ahead of the stale one on PATH, so the suite no longer rots between
        # Edge updates.
        #
        # Deliberately best-effort: if version detection or the download fails,
        # it warns and continues on the pre-installed driver rather than newly
        # breaking a previously-green runner. NOTE: unverified in CI while the
        # self-hosted runner is offline — validate on the next real run.
        shell: pwsh
        continue-on-error: true
        run: |
          $ErrorActionPreference = 'Stop'
          try {
            $edgePaths = @(
              "C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe",
              "C:\Program Files\Microsoft\Edge\Application\msedge.exe"
            )
            $edge = $edgePaths | Where-Object { Test-Path $_ } | Select-Object -First 1
            if (-not $edge) { throw "msedge.exe not found in the usual locations" }
            $ver = (Get-Item $edge).VersionInfo.ProductVersion
            Write-Host "Installed Edge version: $ver"

            $dest = "C:\webdrivers"
            New-Item -ItemType Directory -Force -Path $dest | Out-Null
            $zip = Join-Path $env:RUNNER_TEMP "edgedriver_win64.zip"
            # msedgedriver.microsoft.com is the current stable host (azureedge.net
            # is being retired). The path is the exact Edge version.
            $url = "https://msedgedriver.microsoft.com/$ver/edgedriver_win64.zip"
            Write-Host "Downloading $url"
            Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
            Expand-Archive -Path $zip -DestinationPath $dest -Force

            # Prepend so this matched driver shadows any stale one already on PATH.
            Add-Content -Path $env:GITHUB_PATH -Value $dest
            Write-Host "msedgedriver refreshed to match Edge $ver in $dest"
            & "$dest\msedgedriver.exe" --version
          } catch {
            Write-Warning "Could not refresh msedgedriver ($_). Falling back to the pre-installed driver; if the suite fails with 'DevToolsActivePort', the runner's msedgedriver no longer matches its Edge — re-run WINDOWS_RUNNER_SETUP.md Step 3."
          }

      - name: Verify toolchain present
        # Call each tool directly rather than wrapping in
        # `Write-Host "$(tool --version)"`. PowerShell 7's subexpression
        # interpolation of native command output trips a known bug
        # ("StandardOutputEncoding is only supported when standard output
        # is redirected") for tools whose stdout includes non-ASCII or
        # specific encoding hints — rustc/cargo are the usual victims.
        # Recent runner self-updates bumped pwsh to a version where this
        # surfaces consistently. Calling them as bare commands works
        # because pwsh doesn't try to re-encode anything when stdout
        # flows straight through.
        shell: pwsh
        run: |
          Write-Host "--- Toolchain versions ---"
          node --version
          npm --version
          rustc --version
          cargo --version
          where.exe tauri-driver
          where.exe msedgedriver

      - name: Check if npm install needed
        # Skip `npm ci` (~30-60s) when package-lock.json hasn't changed since
        # the last successful install. Same pattern as release.yml.
        id: npm-hash
        shell: bash
        run: |
          HASH=$(sha256sum package-lock.json | cut -d' ' -f1)
          if [ -f "node_modules/.lockfile-hash" ] && [ "$(cat node_modules/.lockfile-hash)" = "$HASH" ]; then
            echo "Dependencies unchanged, skipping npm ci"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Dependencies changed, will run npm ci"
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "$HASH" > /tmp/lockfile-hash
          fi

      - name: Install frontend deps
        if: steps.npm-hash.outputs.skip != 'true'
        shell: pwsh
        run: |
          npm ci
          Copy-Item /tmp/lockfile-hash node_modules\.lockfile-hash -Force

      - name: Build frontend
        # Vite builds the React bundle into `./dist`. Tauri's
        # `generate_context!()` macro reads tauri.conf.json which points
        # distDir to "../dist" — so this folder must exist before cargo build.
        shell: pwsh
        run: npm run build

      - name: Set up JDK for PDF generator
        # Java 8 target (sourceCompatibility = 1.8 in pdf-generator-cli/build.gradle)
        # but JDK 17 can build it. Temurin 17 is the current LTS.
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build PDF generator JAR
        # Tauri bundles src-tauri/resources/pdf-generator.jar (declared in
        # tauri.conf.json:resources). The JAR isn't committed — it's built
        # fresh from pdf-generator-cli/. After build, Gradle drops it at
        # build/libs/pdf-generator-cli-1.0.0.jar; we copy it to the path
        # Tauri expects.
        #
        # `--no-daemon` because the runner is shared with other jobs and a
        # lingering daemon can hold file locks; the warm Gradle cache makes
        # this fast anyway (~10-20s) even without daemon reuse.
        shell: pwsh
        working-directory: pdf-generator-cli
        run: |
          .\gradlew.bat build --no-daemon
          Copy-Item build\libs\pdf-generator-cli-1.0.0.jar ..\src-tauri\resources\pdf-generator.jar -Force

      - name: Build Tauri release binary
        shell: pwsh
        working-directory: src-tauri
        env:
          # `--release` builds normally disable incremental compilation
          # (Cargo default). On a frequently-rebuilt CI runner where each
          # commit changes only a handful of source files, incremental
          # compilation in release mode saves the bulk of the time it
          # would otherwise spend re-codegen'ing untouched modules.
          # Trade-off: slightly larger build artifacts in `target/release/
          # incremental/` and marginally slower optimizer (LLVM still
          # optimizes per-cgu). For a Tauri E2E test binary, that's a fine
          # cost.
          CARGO_INCREMENTAL: '1'
        run: cargo build --release

      - name: Run Rust unit tests
        # Windows-only modules (raw_input_capture, etc.) have their tests
        # gated behind `cfg(target_os = "windows")`. Free cloud runners are
        # all Linux, so this is the only place those tests actually execute.
        # Run in --release to reuse the build cache from the step above —
        # debug + release build separately, so mismatched profiles double the
        # compile time.
        shell: pwsh
        working-directory: src-tauri
        env:
          CARGO_INCREMENTAL: '1'
        run: cargo test --release --bin vet-clinic

      - name: Run full-stack E2E suite
        shell: pwsh
        env:
          # Quiet down any noisy plugins
          RUST_LOG: info
          # Tells the binary to stay visible so WebDriver can attach. See
          # main.rs `setup()` — the normal startup path hides the window into
          # the tray, which would kill the WebView2 DevTools connection.
          TAURI_E2E: '1'
        run: npx wdio run wdio.conf.ts

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-artifacts
          path: |
            wdio-logs/
            screenshots/
            src-tauri/target/release/*.log
          retention-days: 7
