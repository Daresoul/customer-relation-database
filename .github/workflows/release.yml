name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      clean_build:
        description: 'Force clean build (delete caches)'
        required: false
        default: false
        type: boolean
      version:
        description: 'Version tag (e.g., v0.2.37)'
        required: true
        type: string

jobs:
  release:
    permissions:
      contents: write
    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        shell: bash

    strategy:
      fail-fast: false
      matrix:
        # Temporarily on GitHub-hosted windows-latest while the self-hosted
        # runner is offline. Everything is self-provisioned (Node/Rust/Java via
        # setup actions, pdfium committed, JAR built in-workflow), so hosted
        # builds fine — just cold (no warm cache, ~30-45 min). Switch back to
        # [[self-hosted, Windows]] when the runner returns for faster cached builds.
        # platform: [[self-hosted, Windows]]
        platform: [windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          clean: false
          ref: ${{ inputs.version || github.ref }}

      - name: Clean caches (if requested)
        if: inputs.clean_build == true
        run: |
          echo "Cleaning node_modules and target directories..."
          rm -rf node_modules
          rm -rf src-tauri/target
          echo "Clean complete"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # No Rust cache action here — we run on a dedicated self-hosted Windows
      # runner where target/ + ~/.cargo persist between runs via clean: false.
      # GitHub's actions cache would instead spend 10-20 min/run uploading a
      # 1-2 GB tarball over the runner's outbound bandwidth, which on Swatinem
      # observed worse end-to-end timings than just letting the filesystem
      # handle it. See e2e-windows.yml head comment for the longer story.

      - name: Check if npm install needed
        id: npm-hash
        run: |
          HASH=$(sha256sum package-lock.json | cut -d' ' -f1)
          if [ -f "node_modules/.lockfile-hash" ] && [ "$(cat node_modules/.lockfile-hash)" = "$HASH" ]; then
            echo "Dependencies unchanged, skipping npm ci"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Dependencies changed, will run npm ci"
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "$HASH" > /tmp/lockfile-hash
          fi

      - name: Install dependencies
        if: steps.npm-hash.outputs.skip != 'true'
        run: |
          npm ci
          mv /tmp/lockfile-hash node_modules/.lockfile-hash

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # No Gradle dependency cache — same logic as the Rust cache above.
      # ~/.gradle persists on the runner via clean: false; uploading it to
      # GitHub cache costs more than it saves on a single dedicated runner.

      - name: Build Java PDF Generator (Unix)
        if: runner.os != 'Windows'
        # Dropped `clean` — Gradle's incremental compiler is the whole point.
        # When sources haven't changed this is a sub-second no-op; with `clean`
        # it was a forced ~60-90s rebuild on every run.
        #
        # -PappVersion stamps this release's version into the JAR manifest
        # (Implementation-Version). At runtime the app reads it back and warns
        # if it doesn't match the running app version — catching a stale JAR
        # left behind by a partially-applied update (the July 2026 clinic
        # incident, where an updated app kept rendering PDFs with the old JAR).
        env:
          RELEASE_VERSION: ${{ inputs.version || github.ref_name }}
        run: |
          cd pdf-generator-cli
          chmod +x gradlew
          ./gradlew build -PappVersion="$RELEASE_VERSION"
          cd ..

      - name: Build Java PDF Generator (Windows)
        if: runner.os == 'Windows'
        # See Unix step — `clean` removed for incremental compile.
        # -PappVersion: see the Unix step (JAR version stamp for the stale-JAR guard).
        env:
          RELEASE_VERSION: ${{ inputs.version || github.ref_name }}
        run: |
          cd pdf-generator-cli
          ./gradlew.bat build -PappVersion="$RELEASE_VERSION"
          cd ..

      - name: Copy JAR to Tauri resources (Unix)
        if: runner.os != 'Windows'
        # Bundle the JAR under a VERSION-STAMPED name (pdf-generator-<x.y.z>.jar).
        # The Rust side resolves the name matching the running app version, so a
        # failed update (stale JAR) surfaces as a hard "JAR not found" error rather
        # than silently rendering with outdated code. Strip a leading "v" so the
        # filename matches package_info().version (which has none).
        env:
          RELEASE_VERSION: ${{ inputs.version || github.ref_name }}
        run: |
          mkdir -p src-tauri/resources
          # Drop any JAR from a prior run (the runner persists between builds via
          # clean: false) so exactly one version-stamped JAR ends up in the bundle.
          rm -f src-tauri/resources/pdf-generator*.jar
          VERSION="${RELEASE_VERSION#v}"
          cp pdf-generator-cli/build/libs/pdf-generator-cli-1.0.0.jar "src-tauri/resources/pdf-generator-${VERSION}.jar"
          ls -lh src-tauri/resources/

      - name: Copy JAR to Tauri resources (Windows)
        if: runner.os == 'Windows'
        # See Unix step — version-stamped JAR name for the stale-JAR guard.
        env:
          RELEASE_VERSION: ${{ inputs.version || github.ref_name }}
        run: |
          mkdir -p src-tauri/resources
          rm -f src-tauri/resources/pdf-generator*.jar
          VERSION="${RELEASE_VERSION#v}"
          cp pdf-generator-cli/build/libs/pdf-generator-cli-1.0.0.jar "src-tauri/resources/pdf-generator-${VERSION}.jar"
          ls -lh src-tauri/resources/

      - name: Update version from tag
        run: node .github/scripts/update-version.cjs
        env:
          RELEASE_VERSION: ${{ inputs.version || github.ref_name }}

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          # Enable incremental compilation in release mode. Cargo disables it
          # by default for --release; on a frequently-rebuilt runner this
          # forces re-codegen of every untouched module per build. With
          # incremental on, only files actually changed by the version-bump
          # (Cargo.toml -> the bin crate) need rebuilding — deps stay
          # incremental-cached in target/release/incremental/. Same env var
          # is set in e2e-windows.yml so both workflows produce compatible
          # incremental artifacts via the shared target/ cache.
          CARGO_INCREMENTAL: '1'
        with:
          tagName: ${{ inputs.version || github.ref_name }}
          releaseName: 'Veterinary Clinic Manager ${{ inputs.version || github.ref_name }}'
          releaseBody: 'See the assets to download and install this version.'
          # Publish as a DRAFT: the updater serves `releases/latest`, which
          # excludes drafts, so a build does NOT auto-reach the clinics until a
          # human clicks "Publish release" in GitHub. This is both the immediate
          # need (validate this build on Windows tomorrow before the fleet gets
          # it) and a sound standing posture for a clinical app — no release
          # updates patient-facing machines without a deliberate publish step.
          releaseDraft: true
          prerelease: false
